<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EzzLearn · Учебник</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#c46b1d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Golos+Text:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .reader-shell {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 26px 0 38px;
    }

    .reader-panel {
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: var(--radius-xl);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .reader-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .reader-title {
      margin: 0;
      font-family: "Bitter", Georgia, serif;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.08;
    }

    .reader-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border-radius: var(--radius-lg);
      background: var(--surface-strong);
      border: 1px solid var(--line);
    }

    .reader-page-label {
      min-width: 118px;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
    }

    .reader-stage {
      display: grid;
      place-items: center;
      min-height: 58vh;
      padding: 14px;
      overflow: auto;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        var(--surface-strong);
      background-size: 28px 28px;
      border: 1px solid var(--line);
    }

    #pdf-canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 14px 40px rgba(30, 20, 10, 0.18);
    }

    .reader-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 700;
      text-align: center;
    }

    .reader-loader {
      display: grid;
      gap: 10px;
      justify-items: center;
      color: var(--muted);
      font-weight: 800;
    }

    .reader-spinner {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 4px solid rgba(196, 107, 29, 0.22);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 720px) {
      .reader-shell {
        width: min(100% - 16px, 1180px);
        padding: 16px 0 28px;
      }

      .reader-panel {
        padding: 16px;
      }

      .reader-head {
        flex-direction: column;
      }

      .reader-controls {
        align-items: stretch;
      }

      .reader-controls .action-button {
        flex: 1 1 130px;
      }

      .reader-stage {
        min-height: 56vh;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="reader-shell">
    <section class="reader-panel">
      <div class="reader-head">
        <div>
          <p class="kicker">EzzLearn · учебник</p>
          <h1 id="reader-title" class="reader-title">Учебник</h1>
        </div>
        <a class="action-button secondary" href="index.html">К сайту</a>
      </div>

      <div class="reader-controls" aria-label="Навигация по учебнику">
        <button id="prev-page" class="action-button secondary" type="button">Назад</button>
        <span id="page-label" class="reader-page-label">...</span>
        <button id="next-page" class="action-button secondary" type="button">Вперёд</button>
        <a id="direct-link" class="action-button primary" href="#" target="_blank" rel="noopener">Открыть PDF напрямую</a>
      </div>

      <div id="reader-stage" class="reader-stage">
        <div class="reader-loader">
          <span class="reader-spinner" aria-hidden="true"></span>
          <span>Загружаю учебник...</span>
        </div>
        <canvas id="pdf-canvas" hidden></canvas>
      </div>

      <p class="reader-message">
        Если телефон всё равно не показывает PDF, нажми «Открыть PDF напрямую». Некоторые мобильные браузеры сами решают скачивать PDF, но эта страница старается открыть его внутри сайта.
      </p>
    </section>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.7.284/build/pdf.worker.mjs";

    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "";
    const title = params.get("title") || "Учебник";
    const titleNode = document.getElementById("reader-title");
    const directLink = document.getElementById("direct-link");
    const pageLabel = document.getElementById("page-label");
    const prevButton = document.getElementById("prev-page");
    const nextButton = document.getElementById("next-page");
    const stage = document.getElementById("reader-stage");
    const canvas = document.getElementById("pdf-canvas");
    const context = canvas.getContext("2d");

    let pdf = null;
    let pageNumber = 1;
    let rendering = false;
    let pendingPage = null;

    titleNode.textContent = title;
    document.title = `EzzLearn · ${title}`;

    if (!isSafePdfPath(file)) {
      showError("Не получилось открыть учебник: ссылка на PDF выглядит неправильно.");
    } else {
      directLink.href = file;
      loadPdf(file);
    }

    prevButton.addEventListener("click", () => {
      if (!pdf || pageNumber <= 1) {
        return;
      }

      queueRenderPage(pageNumber - 1);
    });

    nextButton.addEventListener("click", () => {
      if (!pdf || pageNumber >= pdf.numPages) {
        return;
      }

      queueRenderPage(pageNumber + 1);
    });

    async function loadPdf(url) {
      try {
        pdf = await pdfjsLib.getDocument(url).promise;
        queueRenderPage(1);
      } catch (error) {
        console.error(error);
        showError("Не получилось загрузить PDF. Можно попробовать открыть его напрямую.");
      }
    }

    function queueRenderPage(nextPageNumber) {
      if (rendering) {
        pendingPage = nextPageNumber;
        return;
      }

      renderPage(nextPageNumber);
    }

    async function renderPage(nextPageNumber) {
      rendering = true;
      pageNumber = nextPageNumber;
      updateControls();

      const page = await pdf.getPage(pageNumber);
      const stageWidth = Math.max(280, stage.clientWidth - 28);
      const baseViewport = page.getViewport({ scale: 1 });
      const displayScale = Math.min(1.55, stageWidth / baseViewport.width);
      const viewport = page.getViewport({ scale: displayScale });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;
      canvas.hidden = false;

      stage.querySelector(".reader-loader")?.remove();
      await page.render({
        canvasContext: context,
        viewport,
        transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0]
      }).promise;

      rendering = false;

      if (pendingPage !== null) {
        const nextPendingPage = pendingPage;
        pendingPage = null;
        renderPage(nextPendingPage);
      }
    }

    function updateControls() {
      pageLabel.textContent = pdf ? `${pageNumber} / ${pdf.numPages}` : "...";
      prevButton.disabled = !pdf || pageNumber <= 1;
      nextButton.disabled = !pdf || pageNumber >= pdf.numPages;
    }

    function showError(message) {
      stage.innerHTML = `<p class="reader-message">${escapeHtml(message)}</p>`;
      pageLabel.textContent = "ошибка";
      prevButton.disabled = true;
      nextButton.disabled = true;
    }

    function isSafePdfPath(value) {
      return /^textbooks\/[-a-z0-9.]+\.pdf$/i.test(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
